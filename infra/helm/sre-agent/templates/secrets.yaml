apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
type: Opaque
stringData:
  postgres_dsn: {{ .Values.secrets.postgresDsn | quote }}
  openrouter_api_key: {{ .Values.secrets.openrouterApiKey | quote }}
  microsoft_app_id: {{ .Values.secrets.microsoftAppId | quote }}
  microsoft_app_password: {{ .Values.secrets.microsoftAppPassword | quote }}
  microsoft_app_tenant_id: {{ .Values.secrets.microsoftAppTenantId | quote }}
